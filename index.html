<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Recording Analyzer</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
	<link href="https://unpkg.com/tabulator-tables@6.4.0/dist/css/tabulator_simple.min.css" rel="stylesheet">
	<script src="https://unpkg.com/tabulator-tables@6.4.0/dist/js/tabulator.min.js"></script>
	<script defer src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<div class="title-row">
		<img src="magnifying glass.png" alt="Magnifying Glass Icon" width="64" height="64">
		<h1>Recording Analysis</h1>
	</div>

	<div class="button-row">
		<div class="left-buttons">
			<button type="button" id="load-btn">Load JSON File</button>
			<button type="button" id="playlist-btn" disabled>Generate Playlist</button>
			<button type="button" id="export-btn" disabled>Generate Spreadsheet</button>
		</div>
		<button type="button" id="help-btn">Help</button>
	</div>

	<div id="table"></div>

	<script src="script.js"></script>
</body>

</html>
